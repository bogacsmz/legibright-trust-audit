# DataHub ingestion recipe: İddaa/Nesine/Pinnacle odds snapshots (SQLite).
# Run: datahub ingest -c ingest/recipes/iddaa.yml
# Requires: pip install 'acryl-datahub[sqlalchemy]'  (DataHub has no dedicated sqlite
#           source; the generic sqlalchemy source + a sqlite:// URI is the supported path.)

source:
  type: sqlalchemy
  config:
    platform: sqlite
    connect_uri: "sqlite:///${IDDAA_DB}"
    include_views: true
    # NOTE: DataHub's profiler forces a connection pool (max_overflow) that SQLite's
    # NullPool rejects. We keep profiling OFF here and compute distributions/nulls
    # ourselves from the source — which is the point: our checks own the statistics,
    # not DataHub's profiler.
    profiling:
      enabled: false

sink:
  type: datahub-rest
  config:
    server: "${DATAHUB_GMS_URL}"
    token: "${DATAHUB_GMS_TOKEN}"
